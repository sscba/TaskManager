spring.application.name=taskmanagerapp
server.port= ${SERVER_PORT:8080}
# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ===============================
# Hibernate / JPA Config
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create | create-drop | update | validate | none
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL in logs (optional)
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# H2 Console (Web UI)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughToBeSecure123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}
# 86400000ms = 24 hours
# 900000ms = 15 minutes (shorter for access token)
# 60000ms = 1 minutes

# Refresh Token Configuration
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
# 604800000ms = 7 days

# ===============================
# Logging
# ===============================
logging.level.com.example.jwtauth=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.try-it-out-enabled=true

# Show request/response examples
springdoc.show-actuator=false
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Add these pagination defaults
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50
spring.data.web.pageable.one-indexed-parameter=false

# ??? SMTP Configuration (Gmail) ?????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ??? Email Verification Token Config ????????????????????????
# Token expires after 24 hours (in milliseconds)
app.email.verification.expiration=${EMAIL_TOKEN_EXPIRATION:86400000}
# Base URL used inside the email link
app.email.verification.base-url=${APP_BASE_URL:http://localhost:8083}


rate.limit.capacity=${RATE_LIMIT_CAPACITY:10}
# Time window in minutes
rate.limit.refill.period=${RATE_LIMIT_REFILL_PERIOD:1}
# How many tokens added per refill period
rate.limit.refill.tokens=${RATE_LIMIT_REFILL_TOKENS:10}


account.lockout.max-attempts=${LOCKOUT_MAX_ATTEMPTS:5}
# Lockout duration in minutes
account.lockout.duration=${LOCKOUT_DURATION:30}